services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jianji}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jianji_secret_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-jianji}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jianji}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-jianji}:${POSTGRES_PASSWORD:-jianji_secret_change_me}@db:5432/${POSTGRES_DB:-jianji}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-jianji}:${POSTGRES_PASSWORD:-jianji_secret_change_me}@db:5432/${POSTGRES_DB:-jianji}
      TRACKING_CRON_HOUR: ${TRACKING_CRON_HOUR:-16}
      TRACKING_CRON_MINUTE: ${TRACKING_CRON_MINUTE:-30}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
